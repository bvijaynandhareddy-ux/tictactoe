<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Live Game</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f11;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            color: #f43f5e;
            margin-bottom: 10px;
        }
        .status {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #94a3b8;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 8px;
            background: #24242b;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .cell {
            background: #16161a;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }
        .cell:hover {
            background: #1f1f27;
        }
        .cell.X { color: #f43f5e; }
        .cell.O { color: #38bdf8; }
        .reset-btn {
            margin-top: 25px;
            background: #f43f5e;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .reset-btn:hover {
            background: #e11d48;
        }
    </style>
</head>
<body>

    <h1>❌ Tic-Tac-Toe ⭕</h1>
    <div class="status" id="status">Player X's turn</div>

    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <button class="reset-btn" id="reset">Restart Game</button>

    <script>
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const resetButton = document.getElementById('reset');
        const cells = document.querySelectorAll('.cell');

        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let gameRunning = true;

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        function handleCellClick(e) {
            const cell = e.target;
            const index = cell.getAttribute('data-index');

            if (board[index] !== "" || !gameRunning) return;

            board[index] = currentPlayer;
            cell.textContent = currentPlayer;
            cell.classList.add(currentPlayer);

            checkWinOrTie();
        }

        function checkWinOrTie() {
            let roundWon = false;

            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                statusElement.textContent = `The winner is ${currentPlayer}! 🎉`;
                statusElement.style.color = currentPlayer === 'X' ? '#f43f5e' : '#38bdf8';
                gameRunning = false;
                return;
            }

            if (!board.includes("")) {
                statusElement.textContent = "It's a tie! 🤝";
                statusElement.style.color = '#94a3b8';
                gameRunning = false;
                return;
            }

            currentPlayer = currentPlayer === "X" ? "O" : "X";
            statusElement.textContent = `Player ${currentPlayer}'s turn`;
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameRunning = true;
            statusElement.textContent = "Player X's turn";
            statusElement.style.color = '#94a3b8';
            cells.forEach(cell => {
                cell.textContent = "";
                cell.className = "cell";
            });
        }

        boardElement.addEventListener('click', handleCellClick);
        resetButton.addEventListener('click', resetGame);
    </script>
</body>
</html>
