<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Game</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f11;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            text-align: center;
            padding: 40px;
            background: #16161a;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #24242b;
        }
        h1 { color: #f43f5e; margin-bottom: 8px; }
        p { color: #94a3b8; font-size: 1.1rem; }
        .command {
            background: #000000;
            padding: 14px;
            border-radius: 8px;
            font-family: monospace;
            color: #38bdf8;
            margin-top: 25px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>❌ Tic-Tac-Toe Game ⭕</h1>
        <p>Your Python game repository is successfully deployed.</p>
        <p>To play the game on your machine, open your terminal and run:</p>
        <div class="command">python main.py</div>
    </div>
</body>
</html>
